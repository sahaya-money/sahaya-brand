<!--
  Sahaya Mark — Canonical Seed of Life geometry
  viewBox: 0 0 100 100
  7 equal circles R=20. Center (50,50). Six outer centers at distance R, 60° apart.
  Clipped to r=46 bounding circle.
  stroke: #E07820 (saffron)
-->
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="sahaya-clip">
      <circle cx="50" cy="50" r="46"/>
    </clipPath>
  </defs>
  <!-- Seven interlocking circles — Seed of Life -->
  <g clip-path="url(#sahaya-clip)" stroke="#E07820" stroke-width="1.3" fill="none">
    <circle cx="50"    cy="50"    r="20"/><!-- center -->
    <circle cx="70"    cy="50"    r="20"/><!-- right (0°) -->
    <circle cx="60"    cy="32.68" r="20"/><!-- upper-right (60°) -->
    <circle cx="40"    cy="32.68" r="20"/><!-- upper-left (120°) -->
    <circle cx="30"    cy="50"    r="20"/><!-- left (180°) -->
    <circle cx="40"    cy="67.32" r="20"/><!-- lower-left (240°) -->
    <circle cx="60"    cy="67.32" r="20"/><!-- lower-right (300°) -->
  </g>
  <!-- Outer boundary ring -->
  <circle cx="50" cy="50" r="46" stroke="#E07820" stroke-width="0.8" opacity="0.28"/>
  <!-- Center dot — grounding point -->
  <circle cx="50" cy="50" r="2.8" fill="#E07820" opacity="0.85"/>
</svg>
